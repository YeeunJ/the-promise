services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: thepromise
      POSTGRES_USER: thepromise
      POSTGRES_PASSWORD: thepromise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ../apps/api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../apps/api:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  worker:
    build: ../apps/api
    command: celery -A config worker --loglevel=info
    volumes:
      - ../apps/api:/app
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  web:
    build: ../apps/web
    command: pnpm dev --host
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

volumes:
  postgres_data:
